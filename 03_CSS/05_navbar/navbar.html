<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar Variation</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #2c2c2c;
            color: #fff;
        }
        .nav-container {
            margin-bottom: 40px;

        }
        h2 {
            margin-bottom: 10px;
        }
        .nav1 {
            background-color: #fff;
            padding: 10px;
        }
        .nav1 ul {
            list-style-type: none;
            margin: 0px;
            padding: 0px;
            display: flex;
            justify-content: space-between;
        }
        .nav1 li {
            display: inline;

        }
        .nav1 a {
            text-decoration: none;
            color: #1a1a1a;
            font-weight: bold;
            padding: 5px 10px;
            position: relative;
        }
        .nav1 a::after {
            content: "abc";
            position: absolute;
            height: 2px;
            width: 100%;
            bottom: 0;
            left: 0;
            background-color: #325ccf;
            transform: scaleX(0);
            transition: transform 0.3s
            ease-in-out;
        }
        .nav1 a:hover::after {
            transform:  scaleX(1);

        }
        .nav1 .login-btn {
            size: 5px;
            background-color: #0D6EFD;
            color: #fff;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
          

        }
        
        .nav2 {
            background-color: #0d774e;
            width: 200px;
            padding: 20px;
            margin: 0;
            
       }                   
        .nav2 ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .nav2 li {
            margin-bottom: 12px;
        }
        .nav2 a {
            text-decoration: none;
            color: azure;
            display: block;
            padding: 10px;
            width: 100%;
        }
        .nav2 a:hover {
            background-color: #055326;;
        }
        .nav2 .login-btn {
            background-color: #05b147;
            color: #fff;
            padding:  5px;
            width: 100%;
            border: 0;

            
        }
        .nav2 .login-btn:hover {
            background-color: #045f44;
        }
        .nav3 {
            background-color: #2079ee;
        }
        .nav3 ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav3 a {
            text-decoration: none;
            color: #fff;
            padding: 10px;
            display: block;

        }
        .nav3 .dropdown-content {
            display: none;
        }
        .nav3 .dropdown:hover .dropdown-content {
            display: block;
            position: absolute;
            background-color: #494949;
        }

    </style>

</head>
<body>
    <div class="nav-contanier">
        <h2>Variation 1: Horizonatal with underline effect</h2>
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>
    <div class="nav-contanier">
        <h2>Variation 2: Vertical with hover effect</h2>
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <button class="login-btn">Login</button>
            </ul>
        </nav>
    </div>
  
    <div class="nav-contanier">
        <h2>Variation 3: Horizontal with dropdown</h2>
        <nav class="nav3">
            <ul>
                <li><a href="#">Home</a></li>
                <li class="dropdown"><a href="#">About</a>
                    <div class="dropdown-content">
                        <a href="#">Our Story</a>
                        <a href="#">Team</a>
                        <a href="#">Contact</a>
                    </div>
                
                </li>
                
                <li><a href="#">Products</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>
        </nav>
    </div>
  
    
</body>
</html>
